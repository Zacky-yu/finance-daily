<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 小龙财经日报 · 市场情绪版</title>
<style>
/* ═══════════════════════════════════════════════
   🐉 小龙财经日报 — Design System
   Base: ui-design-system · Premium Finance Dark
   ═══════════════════════════════════════════════ */

:root {
  /* Surface hierarchy */
  --bg: #080C16;
  --bg-alt: #0E1525;
  --surface: #141C2E;
  --surface-alt: #1A2440;
  --surface-hover: #223055;
  --border: #253050;
  --border-light: #1E2840;

  /* Text hierarchy */
  --text: #EAF0FF;
  --text-secondary: #B8C5E0;
  --text-muted: #7C8AAA;
  --text-dim: #55607A;

  /* Brand — Premium Gold */
  --gold: #C9A84C;
  --gold-light: #E8D48B;
  --gold-dark: #A68B3A;
  --gold-bg: rgba(201, 168, 76, 0.12);

  /* Accents */
  --accent: #5B8DEF;
  --accent-light: #8DB5FF;
  --accent-bg: rgba(91, 141, 239, 0.12);
  --purple: #9B7EF0;
  --purple-bg: rgba(155, 126, 240, 0.12);
  --teal: #2EC4B6;
  --teal-bg: rgba(46, 196, 182, 0.12);
  --orange: #F5A623;
  --orange-bg: rgba(245, 166, 35, 0.12);
  --pink: #F05A8A;
  --pink-bg: rgba(240, 90, 138, 0.12);

  /* Market movement */
  --up: #F05A5A;
  --up-bg: rgba(240, 90, 90, 0.12);
  --down: #2EC4B6;
  --down-bg: rgba(46, 196, 182, 0.12);
  --flat: #7C8AAA;

  /* Gold spot */
  --gold-spot: #E8B84B;

  /* Typography */
  --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;

  /* Spacing (8pt grid) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --radius-full: 999px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.6);
  --shadow-glow-gold: 0 0 24px rgba(201, 168, 76, 0.06);

  /* Transitions */
  --ease: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1140px;
  margin: 0 auto;
  padding: var(--space-4);
}

/* ═══════════ Header ═══════════ */
header {
  text-align: center;
  padding: var(--space-6) var(--space-4);
  margin-bottom: var(--space-6);
  background: linear-gradient(135deg, #0E1A2E 0%, #141C2E 40%, #1A2440 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(201,168,76,0.03) 0%, transparent 50%);
  pointer-events: none;
}
header h1 {
  font-size: 1.5em;
  color: var(--gold-light);
  letter-spacing: 0.02em;
  margin-bottom: var(--space-1);
  position: relative;
}
header .subtitle {
  color: var(--text-muted);
  font-size: 0.82em;
  letter-spacing: 0.04em;
}
header .status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: var(--space-4);
  margin-top: var(--space-3);
  flex-wrap: wrap;
}
header .update-time {
  color: var(--gold);
  font-size: 0.75em;
  opacity: 0.8;
}
header .refresh-btn {
  background: var(--gold-bg);
  color: var(--gold-light);
  border: 1px solid rgba(201,168,76,0.2);
  padding: 6px 16px;
  border-radius: var(--radius-full);
  font-size: 0.75em;
  cursor: pointer;
  font-weight: 500;
  transition: all var(--ease);
}
header .refresh-btn:hover {
  background: rgba(201,168,76,0.2);
  border-color: rgba(201,168,76,0.4);
  transform: scale(1.02);
}
header .refresh-btn:disabled { opacity: 0.5; cursor: wait; }

/* ═══════════ Sections ═══════════ */
.section {
  margin-bottom: var(--space-8);
  animation: fadeUp 0.4s ease both;
}
.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.10s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.20s; }
.section:nth-child(6) { animation-delay: 0.25s; }
.section:nth-child(7) { animation-delay: 0.30s; }
.section:nth-child(8) { animation-delay: 0.35s; }
.section:nth-child(9) { animation-delay: 0.40s; }
.section:nth-child(10) { animation-delay: 0.45s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-size: 1em;
  color: var(--text-secondary);
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-weight: 600;
  letter-spacing: 0.03em;
}

.sub-section-title {
  font-size: 0.88em;
  color: var(--text-muted);
  margin: var(--space-4) 0 var(--space-2);
  padding-left: var(--space-1);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-weight: 500;
}

/* ═══════════ Grids ═══════════ */
.grid-4 {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}
.grid-5 {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

/* ═══════════ Cards ═══════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-3);
  transition: all var(--ease);
}
.card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.card .label {
  font-size: 0.75em;
  color: var(--text-muted);
  margin-bottom: var(--space-1);
}
.card .value {
  font-size: 1.05em;
  font-weight: 600;
  margin: var(--space-1) 0;
}
.card .sub {
  font-size: 0.78em;
}

/* ═══════════ Tags ═══════════ */
.card-tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: var(--radius-sm);
  font-size: 0.68em;
  font-weight: 600;
  margin-right: 4px;
}
.tag-semi { background: var(--accent-bg); color: var(--accent-light); }
.tag-storage { background: var(--pink-bg); color: var(--pink); }
.tag-gold { background: var(--gold-bg); color: var(--gold-light); }
.tag-market { background: rgba(66,165,245,0.12); color: #64B5F6; }
.tag-hot { background: var(--orange-bg); color: var(--orange); }
.tag-red { background: var(--up-bg); color: var(--up); }
.tag-green { background: var(--down-bg); color: var(--down); }
.tag-blue { background: var(--accent-bg); color: var(--accent-light); }
.tag-purple { background: var(--purple-bg); color: var(--purple); }

/* ═══════════ Market colors ═══════════ */
.up { color: var(--up); }
.down { color: var(--down); }
.flat { color: var(--flat); }
.bullish { color: var(--up); }
.bearish { color: var(--down); }
.neutral { color: var(--orange); }

/* ═══════════ Sentiment ═══════════ */
.sentiment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}
.sentiment-gauge {
  text-align: center;
  padding: var(--space-4);
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
}
.sentiment-value {
  font-size: 2em;
  font-weight: 700;
  margin: var(--space-2) 0;
}

/* ═══════════ Stock Table ═══════════ */
.stock-table {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.stock-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-light);
  align-items: center;
  font-size: 0.85em;
  transition: background var(--ease);
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: var(--surface-hover); }
.stock-row.header-row {
  color: var(--text-dim);
  font-size: 0.72em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--bg-alt);
}
.stock-row .name { font-weight: 500; }
.stock-row .code { color: var(--text-dim); font-size: 0.78em; margin-left: 4px; }
.stock-row .tag-sm { font-size: 0.68em; color: var(--text-dim); margin-left: 6px; }

/* ═══════════ News Items ═══════════ */
.news-item {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2);
  transition: all var(--ease);
}
.news-item:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}
.news-item .news-title { font-size: 0.88em; color: var(--text); margin-bottom: var(--space-1); font-weight: 500; }
.news-item .news-title a { color: var(--accent-light); text-decoration: none; }
.news-item .news-title a:hover { text-decoration: underline; color: var(--accent-light); }
.news-item .news-meta { font-size: 0.72em; color: var(--text-dim); display: flex; gap: var(--space-2); flex-wrap: wrap; }
.news-item .news-desc { font-size: 0.78em; color: var(--text-secondary); margin-top: var(--space-2); line-height: 1.5; }

/* ═══════════ Analysis Box ═══════════ */
.analysis-box {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-top: var(--space-2);
  font-size: 0.85em;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* ═══════════ Old recommend fallback ═══════════ */
.recommend {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2);
  border-left: 3px solid var(--accent);
  transition: all var(--ease);
}
.recommend:hover { background: var(--surface-hover); }
.recommend .r-tag {
  display: inline-block;
  background: var(--accent-bg);
  color: var(--accent-light);
  padding: 1px 7px;
  border-radius: var(--radius-sm);
  font-size: 0.7em;
  font-weight: 600;
  margin-bottom: var(--space-1);
}
.recommend .r-name { font-weight: 600; font-size: 0.88em; margin: var(--space-1) 0; }
.recommend .r-reason { font-size: 0.78em; color: var(--text-secondary); margin-top: var(--space-1); line-height: 1.6; }

/* ═════════════════════════════════════════════
   ✨ SECTION: 今日操作建议 — Trading Signal Cards
   ═══════════════════════════════════════════════ */

.trade-signal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.trade-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  transition: all var(--ease);
  position: relative;
  overflow: hidden;
}
.trade-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}
.trade-card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.trade-card .tc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--space-2);
}
.trade-card .tc-sector {
  font-size: 0.65em;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
  letter-spacing: 0.03em;
}
.trade-card .tc-signal {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  font-size: 0.72em;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: var(--radius-full);
}
.trade-card .tc-signal.buy {
  background: var(--down-bg);
  color: var(--down);
}
.trade-card .tc-signal.hold {
  background: var(--gold-bg);
  color: var(--gold-light);
}
.trade-card .tc-signal.watch {
  background: var(--orange-bg);
  color: var(--orange);
}
.trade-card .tc-name {
  font-size: 0.95em;
  font-weight: 600;
  margin-bottom: var(--space-1);
}
.trade-card .tc-name .tc-code {
  font-size: 0.78em;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-weight: 400;
  margin-left: var(--space-1);
}
.trade-card .tc-price-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-2);
}
.trade-card .tc-price {
  font-size: 1.3em;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.trade-card .tc-change {
  font-size: 0.85em;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.trade-card .tc-change.up { background: var(--up-bg); }
.trade-card .tc-change.down { background: var(--down-bg); }
.trade-card .tc-logic {
  font-size: 0.78em;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-alt);
  border-radius: var(--radius-sm);
}
.trade-card .tc-risk {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 0.72em;
  padding-top: var(--space-2);
  border-top: 1px solid var(--border-light);
}
.trade-card .tc-risk-label {
  color: var(--text-dim);
}
.trade-card .tc-risk-bar {
  flex: 1;
  height: 4px;
  background: var(--border-light);
  border-radius: 2px;
  overflow: hidden;
}
.trade-card .tc-risk-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}
.trade-card .tc-risk-text {
  font-weight: 600;
  font-size: 0.92em;
}

/* Signal colors by sector */
.trade-card.sector-semi::before { background: var(--accent); }
.trade-card.sector-storage::before { background: var(--pink); }
.trade-card.sector-gold::before { background: var(--gold); }
.trade-card.sector-silver::before { background: var(--teal); }

/* ═══════════════════════════════════════════════
   🏦 SECTION: 美联储预期 — FOMC Board
   ═══════════════════════════════════════════════ */

.fed-header-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  margin-bottom: var(--space-3);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}
.fed-header-card .fed-rate {
  display: flex;
  flex-direction: column;
}
.fed-header-card .fed-rate-label {
  font-size: 0.7em;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.fed-header-card .fed-rate-value {
  font-size: 1.6em;
  font-weight: 700;
  color: var(--gold-light);
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.fed-header-card .fed-rate-sub {
  font-size: 0.72em;
  color: var(--text-muted);
  margin-top: var(--space-1);
}
.fed-header-card .fed-next {
  text-align: right;
}
.fed-header-card .fed-next-label {
  font-size: 0.7em;
  color: var(--text-dim);
}
.fed-header-card .fed-next-date {
  font-size: 1em;
  font-weight: 600;
  color: var(--accent-light);
}
.fed-header-card .fed-next-days {
  font-size: 0.72em;
  color: var(--text-muted);
}

.fomc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.fomc-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  transition: all var(--ease);
  position: relative;
}
.fomc-card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
  transform: translateY(-1px);
}
.fomc-card.fomc-upcoming {
  border-color: rgba(201,168,76,0.3);
}
.fomc-card.fomc-past {
  opacity: 0.7;
}
.fomc-card .fomc-date {
  font-size: 0.72em;
  color: var(--text-dim);
  margin-bottom: var(--space-1);
}
.fomc-card .fomc-label {
  font-size: 0.88em;
  font-weight: 600;
  margin-bottom: var(--space-1);
}
.fomc-card .fomc-type {
  font-size: 0.68em;
  color: var(--text-muted);
  margin-bottom: var(--space-2);
}
.fomc-card .fomc-status {
  display: inline-block;
  font-size: 0.65em;
  padding: 1px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
}
.fomc-card .fomc-status.status-done {
  background: var(--down-bg);
  color: var(--down);
}
.fomc-card .fomc-status.status-waiting {
  background: var(--orange-bg);
  color: var(--orange);
}
.fomc-card .fomc-prob {
  margin-top: var(--space-2);
  padding-top: var(--space-2);
  border-top: 1px solid var(--border-light);
  text-align: center;
}
.fomc-card .fomc-prob-value {
  font-size: 1.2em;
  font-weight: 700;
  font-family: var(--font-mono);
}
.fomc-card .fomc-prob-label {
  font-size: 0.68em;
  color: var(--text-dim);
}

/* Fed Events Feed */
.fed-events {
  margin-top: var(--space-2);
}
.fed-event-item {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2);
  transition: all var(--ease);
}
.fed-event-item:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}
.fed-event-item .fe-title {
  font-size: 0.85em;
  font-weight: 500;
  margin-bottom: var(--space-1);
}
.fed-event-item .fe-title a {
  color: var(--accent-light);
  text-decoration: none;
}
.fed-event-item .fe-title a:hover { text-decoration: underline; }
.fed-event-item .fe-meta {
  font-size: 0.7em;
  color: var(--text-dim);
}

/* ═══════════════════════════════════════════════
   💾 SECTION: 半导体存储芯片 — Premium ETF & Stock
   ═══════════════════════════════════════════════ */

.semi-etf-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  transition: all var(--ease);
  display: flex;
  flex-direction: column;
}
.semi-etf-card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.semi-etf-card .sec-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--space-2);
}
.semi-etf-card .sec-name {
  font-size: 0.85em;
  font-weight: 500;
}
.semi-etf-card .sec-code {
  font-size: 0.65em;
  color: var(--text-dim);
}
.semi-etf-card .sec-price-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: var(--space-1);
}
.semi-etf-card .sec-price {
  font-size: 1.15em;
  font-weight: 700;
  font-family: var(--font-mono);
}
.semi-etf-card .sec-change {
  font-size: 0.82em;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.semi-etf-card .sec-change.up { background: var(--up-bg); color: var(--up); }
.semi-etf-card .sec-change.down { background: var(--down-bg); color: var(--down); }
.semi-etf-card .sec-vol {

  color: var(--text-dim);

/* Enhanced stock rows for semiconductor */
.semi-stock-table {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.semi-stock-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.2fr;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  align-items: center;
  font-size: 0.85em;
  transition: background var(--ease);
}
.semi-stock-row:last-child { border-bottom: none; }
.semi-stock-row:hover { background: var(--surface-hover); }
.semi-stock-row.ss-header {
  color: var(--text-dim);
  font-size: 0.7em;
  letter-spacing: 0.5px;
  background: var(--bg-alt);
  text-transform: uppercase;
}
.semi-stock-row .ss-name {
  font-weight: 500;
  display: flex;
  flex-direction: column;
}
.semi-stock-row .ss-name .ss-sub {
  font-size: 0.72em;
  color: var(--text-dim);
  font-weight: 400;
}
.semi-stock-row .ss-price {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.95em;
}
.semi-stock-row .ss-change {
  font-weight: 600;
}
.semi-stock-row .ss-change.up { color: var(--up); }
.semi-stock-row .ss-change.down { color: var(--down); }
.semi-stock-row .ss-tag {
  justify-self: end;
  font-size: 0.62em;
  padding: 2px 8px;
  border-radius: var(--radius-full);

}
.semi-stock-row .ss-tag.tag-leader { background: var(--accent-bg); color: var(--accent-light); }
.semi-stock-row .ss-tag.tag-equip { background: var(--purple-bg); color: var(--purple); }
.semi-stock-row .ss-tag.tag-test { background: var(--teal-bg); color: var(--teal); }
.semi-stock-row .ss-tag.tag-interface { background: var(--pink-bg); color: var(--pink); }

/* ═══════════════════════════════════════════════
   🏆 SECTION: 黄金白银 — Precious Metals Dashboard
   ═══════════════════════════════════════════════ */

.pm-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.pm-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  transition: all var(--ease);
  position: relative;
  overflow: hidden;
}
.pm-card.pm-gold {
  border-color: rgba(201, 168, 76, 0.2);
}
.pm-card.pm-gold::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
}
.pm-card.pm-silver {
  border-color: rgba(46, 196, 182, 0.2);
}
.pm-card.pm-silver::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--teal), #6EE7D0);
}
.pm-card:hover {
  background: var(--surface-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.pm-card .pm-icon {
  font-size: 1.4em;
  margin-bottom: var(--space-1);
}
.pm-card .pm-metal {
  font-size: 0.78em;
  color: var(--text-muted);
  margin-bottom: var(--space-1);
  letter-spacing: 0.03em;
}
.pm-card .pm-metal strong {
  color: var(--text-secondary);
  font-weight: 600;
}
.pm-card .pm-price-row {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.pm-card .pm-price {
  font-size: 1.5em;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.pm-card.pm-gold .pm-price { color: var(--gold-light); }
.pm-card.pm-silver .pm-price { color: #6EE7D0; }
.pm-card .pm-change {
  font-size: 0.85em;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
}
.pm-card .pm-change.up { background: var(--up-bg); color: var(--up); }
.pm-card .pm-change.down { background: var(--down-bg); color: var(--down); }
.pm-card .pm-details {
  display: flex;
  gap: var(--space-4);
  margin-top: var(--space-2);
  padding-top: var(--space-2);
  border-top: 1px solid var(--border-light);
  font-size: 0.72em;
  color: var(--text-muted);
}
.pm-card .pm-details span { display: flex; align-items: center; gap: var(--space-1); }

/* ═══════════ Loading / Footer / Scrollbar ═══════════ */
.loading-spinner {
  text-align: center;
  padding: 80px 20px;
}
.loading-spinner .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.7em;
  padding: var(--space-6) 0 var(--space-8);
  border-top: 1px solid var(--border-light);
  margin-top: var(--space-6);
}
.footer a { color: var(--text-muted); text-decoration: none; }
.footer a:hover { color: var(--accent-light); }

.news-badge {
  display: inline-block;
  font-size: 0.62em;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  margin-left: 4px;
  vertical-align: middle;
}
.badge-cache { background: rgba(66,165,245,0.15); color: #64B5F6; }
.badge-fresh { background: rgba(79,209,197,0.15); color: #5EEAD4; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════ Responsive ═══════════ */
@media (max-width: 640px) {
  .container { padding: var(--space-3); }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .stock-row { grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr; font-size: 0.78em; }
  .semi-stock-row { grid-template-columns: 1.5fr 0.8fr 0.8fr 1fr; font-size: 0.78em; }
  .trade-signal-grid { grid-template-columns: 1fr; }
  .pm-grid { grid-template-columns: 1fr; }
  .fed-header-card { flex-direction: column; text-align: center; }
  .fed-header-card .fed-next { text-align: center; }
  .fomc-grid { grid-template-columns: repeat(2, 1fr); }
  header .status-bar { flex-direction: column; gap: var(--space-2); }
}
</style>
</head>
