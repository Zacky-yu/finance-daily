name: 🕐 定时抓取新闻缓存

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 📥 抓取多源 RSS
        run: |
          # 1. MarketWatch
          curl -s -o /tmp/mw.xml "https://feeds.content.dowjones.io/public/rss/mw_topstories" || true
          # 2. CNBC Top News
          curl -s -o /tmp/cnbc.xml "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114" || true
          # 3. Yahoo Finance
          curl -s -o /tmp/yahoo.xml "https://finance.yahoo.com/news/rssindex" || true
          # 4. Fed Press Releases
          curl -s -o /tmp/fed.xml "https://www.federalreserve.gov/feeds/press_all.xml" || true

      - name: 🔄 合并 RSS 为 JSON
        run: |
          node -e "
          const fs = require('fs');
          const sources = {
            marketwatch: { file: '/tmp/mw.xml', tag: 'US', category: '美股' },
            cnbc:        { file: '/tmp/cnbc.xml', tag: 'US', category: '全球市场' },
            yahoo:       { file: '/tmp/yahoo.xml', tag: 'US', category: '全球市场' },
            fed:         { file: '/tmp/fed.xml', tag: 'FED', category: '美联储' },
          };

          function parseRSS(xml) {
            const items = [];
            const re = /<item>([\s\S]*?)<\/item>/g;
            let m;
            while ((m = re.exec(xml)) !== null && items.length < 10) {
              const ix = m[1];
              const g = (tag) => {
                const p = new RegExp('<' + tag + '[^>]*><!\[CDATA\[([\s\S]*?)\]\]><\/' + tag + '>|<' + tag + '[^>]*>([\s\S]*?)<\/' + tag + '>');
                const r = p.exec(ix);
                return (r && (r[1] || r[2] || '')).trim();
              };
              items.push({
                title: g('title'),
                link: g('link'),
                pubDate: g('pubDate'),
                content: g('description').replace(/<[^>]*>/g, '').substring(0, 300),
              });
            }
            return items;
          }

          const allNews = [];
          for (const [key, src] of Object.entries(sources)) {
            try {
              const xml = fs.readFileSync(src.file, 'utf-8');
              const items = parseRSS(xml);
              items.forEach(item => { item.source = src.tag; item.category = src.category; });
              allNews.push(...items);
              console.log('  ✓ ' + key + ': ' + items.length + ' items');
            } catch(e) {
              console.log('  ✗ ' + key + ': ' + e.message);
            }
          }

          const seen = new Set();
          const unique = allNews.filter(item => {
            const key = item.title.substring(0, 60);
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          }).sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate)).slice(0, 30);

          const result = {
            items: unique,
            fetchedAt: new Date().toISOString(),
            count: unique.length,
            sources: Object.keys(sources).join(',')
          };

          fs.writeFileSync('public/news-cache.json', JSON.stringify(result, null, 2));
          console.log('Total: ' + unique.length + ' items saved');
          "

      - name: 📤 提交并推送
        run: |
          git config user.name 'xiaolong-bot'
          git config user.email 'bot@xiaolong.finance'
          git add public/news-cache.json
          git diff --cached --quiet || git commit -m "🕐 新闻缓存 $(date -u '+%Y-%m-%d %H:00')"
          git push
