<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐎 小龙财经日报</title>
<style>
:root {
  --bg: #0f1419;
  --card: #1a2634;
  --card-hover: #243447;
  --border: #2f3f4f;
  --text: #e7e9ea;
  --text-muted: #8899a6;
  --text-dim: #536471;
  --accent: #4fd1c5;
  --pink: #f472b6;
  --gold: #ffc107;
  --red: #ef4444;
  --green: #22c55e;
  --orange: #ff9800;
  --blue: #42a5f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* Header */
header {
  text-align: center; margin-bottom: 24px; padding: 20px;
  background: linear-gradient(135deg, #1a2634, #0d3248);
  border-radius: 14px; position: relative;
}
header h1 { font-size: 1.6em; color: var(--accent); margin-bottom: 4px; }
header .subtitle { color: var(--text-muted); font-size: 0.85em; }
header .status-bar {
  display: flex; justify-content: center; align-items: center; gap: 16px;
  margin-top: 10px; flex-wrap: wrap;
}
header .update-time { color: var(--gold); font-size: 0.78em; }
header .refresh-btn {
  background: var(--accent); color: #0f1419; border: none;
  padding: 5px 14px; border-radius: 20px; font-size: 0.78em;
  cursor: pointer; font-weight: 600; transition: all 0.2s;
}
header .refresh-btn:hover { background: #5eead4; transform: scale(1.03); }
header .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
header .auto-status { font-size: 0.72em; color: var(--text-dim); }

/* Section */
.section { margin-bottom: 24px; }
.section-title {
  font-size: 1.1em; color: var(--accent); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}

/* Grids */
.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 12px; }
.grid-5 { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 12px; }

/* Cards */
.card {
  background: var(--card); border-radius: 10px; padding: 10px 12px;
  transition: background 0.2s;
}
.card:hover { background: var(--card-hover); }
.card .label { font-size: 0.78em; color: var(--text-muted); }
.card .value { font-size: 1.05em; font-weight: 600; margin: 3px 0; }
.card .sub { font-size: 0.78em; }
.card-tag {
  display: inline-block; padding: 1px 7px; border-radius: 6px;
  font-size: 0.68em; font-weight: 600; margin-right: 4px;
}
.tag-semi { background: rgba(79,209,197,0.15); color: var(--accent); }
.tag-storage { background: rgba(244,114,182,0.15); color: var(--pink); }
.tag-gold { background: rgba(255,193,7,0.15); color: var(--gold); }
.tag-market { background: rgba(66,165,245,0.15); color: var(--blue); }
.tag-hot { background: rgba(255,152,0,0.15); color: var(--orange); }
.tag-red { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }

.up { color: var(--red); }
.down { color: var(--green); }
.flat { color: var(--text-muted); }
.bullish { color: var(--red); }
.bearish { color: var(--green); }
.neutral { color: var(--orange); }

/* Stock table */
.stock-table { background: var(--card); border-radius: 10px; overflow: hidden; }
.stock-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 0.85em;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: var(--card-hover); }
.stock-row.header-row {
  color: var(--text-dim); font-size: 0.75em;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.stock-row .name { font-weight: 500; }
.stock-row .code { color: var(--text-dim); font-size: 0.78em; margin-left: 4px; }
.stock-row .tag-sm { font-size: 0.68em; color: var(--text-dim); margin-left: 6px; }

/* News */
.news-item {
  background: var(--card); border-radius: 10px; padding: 12px 14px;
  margin-bottom: 6px; transition: background 0.2s;
}
.news-item:hover { background: var(--card-hover); }
.news-item .news-title { font-size: 0.9em; color: #fff; margin-bottom: 4px; font-weight: 500; }
.news-item .news-title a { color: var(--accent); text-decoration: none; }
.news-item .news-title a:hover { text-decoration: underline; }
.news-item .news-meta { font-size: 0.74em; color: var(--text-dim); display: flex; gap: 10px; flex-wrap: wrap; }
.news-item .news-desc { font-size: 0.8em; color: #b0bec5; margin-top: 5px; }

/* Stock section headers */
.sub-section-title {
  font-size: 0.92em; margin: 10px 0 6px; padding-left: 4px;
  display: flex; align-items: center; gap: 6px;
}

/* Analysis box */
.analysis-box {
  background: linear-gradient(135deg, #1a2634, #1a2a30);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  margin: 8px 0; font-size: 0.82em; color: #b0bec5; line-height: 1.7;
}
.analysis-box .a-title { color: var(--accent); font-weight: 600; font-size: 0.88em; margin-bottom: 5px; }

/* Recommendation */
.recommend {
  background: linear-gradient(135deg, #1a2a3a, #0d3248);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  border-left: 3px solid var(--accent);
}
.recommend .r-tag {
  display: inline-block; background: rgba(79,209,197,0.2); color: var(--accent);
  padding: 1px 7px; border-radius: 5px; font-size: 0.7em; font-weight: 600; margin-bottom: 5px;
}
.recommend .r-name { font-weight: 600; font-size: 0.9em; }
.recommend .r-reason { font-size: 0.78em; color: #b0bec5; margin-top: 5px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 640px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .stock-row { grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr; font-size: 0.78em; }
  header .status-bar { flex-direction: column; gap: 8px; }
}

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top: 3px solid var(--accent); border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer { text-align: center; color: var(--text-dim); font-size: 0.72em; padding: 16px 0 30px; border-top: 1px solid var(--border); margin-top: 20px; }
.footer a { color: var(--accent); text-decoration: none; }

/* Badge for 实时资讯 */
.news-badge {
  display: inline-block; font-size: 0.65em; padding: 1px 6px; border-radius: 8px;
  margin-left: 4px; vertical-align: middle;
}
.badge-cache { background: rgba(66,165,245,0.2); color: var(--blue); }
.badge-fresh { background: rgba(79,209,197,0.2); color: var(--accent); }


.sentiment-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; margin-bottom:12px; }
.sentiment-gauge { text-align:center; padding:16px; }
.sentiment-value { font-size:2em; font-weight:700; margin:6px 0; }
.recommend { background:var(--card); border-radius:10px; padding:12px 14px; margin-bottom:8px; border-left:3px solid var(--accent); }
.recommend:hover { background:var(--card-hover); }
.recommend .r-name { font-size:0.9em; font-weight:500; margin:4px 0; }
.recommend .r-reason { font-size:0.78em; color:var(--text-muted); line-height:1.5; }
.loading-spinner { text-align:center; padding:60px 20px; }
.loading-spinner .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
@media (max-width:640px){.grid-4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🐎 小龙财经日报 · 市场情绪版</h1>
<div class="subtitle">实时A股指数 · 行业ETF · 全球资讯 · 市场情绪监控</div>
<div class="status-bar">
<span class="update-time" id="updateTime">⏳ 加载中...</span>
<button class="refresh-btn" id="refreshBtn" onclick="refreshNow()">🔄 刷新数据</button>
</div>
</header>
<div id="loading" class="loading-spinner"><div class="spinner"></div><div style="color:var(--text-muted);font-size:0.9em;">正在加载...</div></div>
<div id="content" style="display:none;">
<div class="section"><div class="section-title">📊 市场情绪监控</div><div id="sentimentPanel"></div><div class="analysis-box" id="newsAnalysis" style="border-color:var(--blue);"></div></div>
<div class="section"><div class="section-title">🏳 A股大盘</div><div class="grid-4" id="indexGrid"></div></div>
<div class="section"><div class="section-title">🌟 降息预期</div><div id="rateCutGrid" class="grid-4"></div><div class="analysis-box" id="rateCutAnalysis" style="border-color:var(--orange);"></div></div>
<div class="section">
<div class="section-title">🔩 半导体 & 存储芯片</div>
<div class="sub-section-title" style="color:var(--accent);">📝 ETF</div><div class="grid-4" id="etfGrid"></div>
<div class="sub-section-title" style="color:var(--accent);">📅 个股</div><div id="stockList"></div>
</div>
<div class="section"><div class="section-title" style="color:var(--gold);">🌜 黄金</div><div class="grid-4" id="goldGrid"></div></div>
<div class="section"><div class="section-title">📰 实时资讯</div><div id="newsList"></div></div>
<div class="section"><div class="section-title" style="color:var(--blue);">🌍 外盘预览</div><div id="foreignPreview"></div></div>
<div class="section"><div class="section-title" style="color:var(--pink);">📌 明日关注</div><div id="tomorrowFocus"></div></div>
<div class="section"><div class="section-title">💵 操作思路</div><div id="recommendList"></div></div>
<div class="section"><div class="section-title" style="color:var(--orange);">🏺 美联储追踪</div><div id="fedTracking"></div></div>
</div></div>
<script src="./fetch.js"></script>
</body>
</html>
