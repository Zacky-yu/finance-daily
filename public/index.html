<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 小龙财经日报 · 实时版</title>
<style>
:root {
  --bg: #0f1419;
  --card: #1a2634;
  --card-hover: #243447;
  --border: #2f3f4f;
  --text: #e7e9ea;
  --text-muted: #8899a6;
  --text-dim: #536471;
  --accent: #4fd1c5;
  --pink: #f472b6;
  --gold: #ffc107;
  --red: #ef4444;
  --green: #22c55e;
  --orange: #ff9800;
  --blue: #42a5f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* Header */
header {
  text-align: center; margin-bottom: 24px; padding: 20px;
  background: linear-gradient(135deg, #1a2634, #0d3248);
  border-radius: 14px; position: relative;
}
header h1 { font-size: 1.6em; color: var(--accent); margin-bottom: 4px; }
header .subtitle { color: var(--text-muted); font-size: 0.85em; }
header .status-bar {
  display: flex; justify-content: center; align-items: center; gap: 16px;
  margin-top: 10px; flex-wrap: wrap;
}
header .update-time { color: var(--gold); font-size: 0.78em; }
header .refresh-btn {
  background: var(--accent); color: #0f1419; border: none;
  padding: 5px 14px; border-radius: 20px; font-size: 0.78em;
  cursor: pointer; font-weight: 600; transition: all 0.2s;
}
header .refresh-btn:hover { background: #5eead4; transform: scale(1.03); }
header .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
header .auto-status { font-size: 0.72em; color: var(--text-dim); }

/* Section */
.section { margin-bottom: 24px; }
.section-title {
  font-size: 1.1em; color: var(--accent); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}

/* Grids */
.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 12px; }
.grid-5 { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 12px; }

/* Cards */
.card {
  background: var(--card); border-radius: 10px; padding: 10px 12px;
  transition: background 0.2s;
}
.card:hover { background: var(--card-hover); }
.card .label { font-size: 0.78em; color: var(--text-muted); }
.card .value { font-size: 1.05em; font-weight: 600; margin: 3px 0; }
.card .sub { font-size: 0.78em; }
.card-tag {
  display: inline-block; padding: 1px 7px; border-radius: 6px;
  font-size: 0.68em; font-weight: 600; margin-right: 4px;
}
.tag-semi { background: rgba(79,209,197,0.15); color: var(--accent); }
.tag-storage { background: rgba(244,114,182,0.15); color: var(--pink); }
.tag-gold { background: rgba(255,193,7,0.15); color: var(--gold); }
.tag-market { background: rgba(66,165,245,0.15); color: var(--blue); }
.tag-hot { background: rgba(255,152,0,0.15); color: var(--orange); }
.tag-red { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }

.up { color: var(--red); }
.down { color: var(--green); }
.flat { color: var(--text-muted); }
.bullish { color: var(--red); }
.bearish { color: var(--green); }
.neutral { color: var(--orange); }

/* Stock table */
.stock-table { background: var(--card); border-radius: 10px; overflow: hidden; }
.stock-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 0.85em;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: var(--card-hover); }
.stock-row.header-row {
  color: var(--text-dim); font-size: 0.75em;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.stock-row .name { font-weight: 500; }
.stock-row .code { color: var(--text-dim); font-size: 0.78em; margin-left: 4px; }
.stock-row .tag-sm { font-size: 0.68em; color: var(--text-dim); margin-left: 6px; }

/* News */
.news-item {
  background: var(--card); border-radius: 10px; padding: 12px 14px;
  margin-bottom: 6px; transition: background 0.2s;
}
.news-item:hover { background: var(--card-hover); }
.news-item .news-title { font-size: 0.9em; color: #fff; margin-bottom: 4px; font-weight: 500; }
.news-item .news-title a { color: var(--accent); text-decoration: none; }
.news-item .news-title a:hover { text-decoration: underline; }
.news-item .news-meta { font-size: 0.74em; color: var(--text-dim); display: flex; gap: 10px; flex-wrap: wrap; }
.news-item .news-desc { font-size: 0.8em; color: #b0bec5; margin-top: 5px; }

/* Stock section headers */
.sub-section-title {
  font-size: 0.92em; margin: 10px 0 6px; padding-left: 4px;
  display: flex; align-items: center; gap: 6px;
}

/* Analysis box */
.analysis-box {
  background: linear-gradient(135deg, #1a2634, #1a2a30);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  margin: 8px 0; font-size: 0.82em; color: #b0bec5; line-height: 1.7;
}
.analysis-box .a-title { color: var(--accent); font-weight: 600; font-size: 0.88em; margin-bottom: 5px; }

/* Recommendation */
.recommend {
  background: linear-gradient(135deg, #1a2a3a, #0d3248);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  border-left: 3px solid var(--accent);
}
.recommend .r-tag {
  display: inline-block; background: rgba(79,209,197,0.2); color: var(--accent);
  padding: 1px 7px; border-radius: 5px; font-size: 0.7em; font-weight: 600; margin-bottom: 5px;
}
.recommend .r-name { font-weight: 600; font-size: 0.9em; }
.recommend .r-reason { font-size: 0.78em; color: #b0bec5; margin-top: 5px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 640px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .stock-row { grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr; font-size: 0.78em; }
  header .status-bar { flex-direction: column; gap: 8px; }
}

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top: 3px solid var(--accent); border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer { text-align: center; color: var(--text-dim); font-size: 0.72em; padding: 16px 0 30px; border-top: 1px solid var(--border); margin-top: 20px; }
.footer a { color: var(--accent); text-decoration: none; }

/* Badge for 实时资讯 */
.news-badge {
  display: inline-block; font-size: 0.65em; padding: 1px 6px; border-radius: 8px;
  margin-left: 4px; vertical-align: middle;
}
.badge-cache { background: rgba(66,165,245,0.2); color: var(--blue); }
.badge-fresh { background: rgba(79,209,197,0.2); color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐉 小龙财经日报</h1>
    <div class="subtitle">聚焦半导体 · 存储芯片 · AI科技 · 黄金白银</div>
    <div class="status-bar">
      <span class="update-time" id="updateTime">加载中...</span>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshNow()">⟳ 刷新数据</button>
      <span class="auto-status" id="autoStatus">每5分钟自动更新</span>
    </div>
  </header>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在获取实时数据...</div>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="content" style="display:none;">

    <!-- ═══ 大盘 ═══ -->
    <div class="section">
      <div class="section-title">📊 A股大盘</div>
      <div class="grid-4" id="indicesGrid"></div>
      <div class="analysis-box" id="indexAnalysis"></div>
    </div>

    <!-- ═══ 半导体&存储芯片 ═══ -->
    <div class="section">
      <div class="section-title">🔬 半导体 & 存储芯片</div>

      <div class="sub-section-title" style="color:var(--accent);">📦 ETF 表现</div>
      <div class="grid-5" id="etfGrid"></div>

      <div class="sub-section-title" style="color:var(--pink);">🧠 存储芯片</div>
      <div class="stock-table" id="storageTable">
        <div class="stock-row header-row">
          <span>名称</span><span>价格</span><span>涨跌幅</span><span>涨跌额</span>
        </div>
      </div>

      <div class="sub-section-title" style="color:var(--accent);">🔩 半导体产业链</div>
      <div class="stock-table" id="semiTable">
        <div class="stock-row header-row">
          <span>名称</span><span>价格</span><span>涨跌幅</span><span>涨跌额</span>
        </div>
      </div>

      <div class="analysis-box" id="semiAnalysis"></div>
    </div>

    <!-- ═══ 黄金白银 ═══ -->
    <div class="section">
      <div class="section-title" style="color:var(--gold);">🥇 黄金 & 白银</div>
      <div class="grid-4" id="goldGrid"></div>
      <div class="analysis-box" id="goldAnalysis" style="border-color:var(--gold);"></div>
    </div>

    <!-- ═══ 实时资讯 ═══ -->
    <div class="section">
      <div class="section-title">📰 实时资讯 <span id="newsBadge" style="display:none;"></span></div>
      <div id="newsList"></div>
    </div>

    <!-- ═══ 重要消息解读 ═══ -->
    <div class="section">
      <div class="section-title" style="color:var(--orange);">🔥 重要消息解读</div>
      <div id="newsAnalysis"></div>
    </div>

    <!-- ═══ 外盘预告 ═══ -->
    <div class="section">
      <div class="section-title" style="color:var(--blue);">🌍 外盘预告</div>
      <div class="grid-4" id="foreignGrid"></div>
      <div class="analysis-box" id="foreignAnalysis" style="border-color:var(--blue);"></div>
    </div>

    <!-- ═══ 明日关注 ═══ -->
    <div class="section">
      <div class="section-title" style="color:var(--pink);">📅 明日关注</div>
      <div id="tomorrowEvents"></div>
      <div class="analysis-box" id="tomorrowAnalysis"></div>
    </div>

    <!-- ═══ 操作思路 ═══ -->
    <div class="section">
      <div class="section-title" style="color:var(--accent);">💡 操作思路</div>
      <div id="strategyAnalysis"></div>
    </div>

    <!-- ═══ 个股推荐 ═══ -->
    <div class="section">
      <div class="section-title">🎯 个股关注</div>
      <div id="recommendList"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>🐉 小龙财经日报 · 实时版</p>
      <p>数据来源: 腾讯财经 · MarketWatch · 实时行情</p>
      <p style="margin-top:6px;">⏰ 行情每5分钟刷新 · 资讯每小时更新(缓存)</p>
      <p style="margin-top:8px; color:var(--text-dim);">⚠️ 仅供参考，不构成投资建议</p>
    </div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────
let lastData = null;
let autoTimer = null;
const NEWS_CACHE_KEY = 'xl_finance_news_cache';
const NEWS_CACHE_TTL = 60 * 60 * 1000; // 1 hour

// ─── Tencent API helpers (CORS enabled) ────────────────────────
async function fetchTencent(qry) {
  const resp = await fetch('https://qt.gtimg.cn/q=' + qry);
  const buf = await resp.arrayBuffer();
  return new TextDecoder('gbk').decode(buf);
}

function parseTencentLine(line, fields) {
  const m = line.match(/v_[^=]+="([^"]+)"/);
  if (!m) return null;
  const parts = m[1].split('~');
  const item = {};
  for (const [key, idx] of Object.entries(fields)) item[key] = parts[idx] || '';
  return item;
}

function parseTencentLines(raw) {
  return raw.split('\n').filter(Boolean).map(line => {
    const p = parseTencentLine(line, { name: 1, code: 2, price: 3, change: 31, changePct: 32, high: 33, low: 34, open: 5 });
    return p ? { name: p.name, code: p.code, price: parseFloat(p.price) || 0, change: parseFloat(p.change) || 0, changePct: parseFloat(p.changePct) || 0, high: parseFloat(p.high) || 0, low: parseFloat(p.low) || 0, open: parseFloat(p.open) || 0 } : null;
  }).filter(Boolean);
}

function parseStockLines(raw) {
  return raw.split('\n').filter(Boolean).map(line => {
    const p = parseTencentLine(line, { name: 1, code: 2, price: 3, change: 31, changePct: 32, high: 33, low: 34, open: 5 });
    return p ? { name: p.name, code: p.code, price: parseFloat(p.price) || 0, changePct: parseFloat(p.changePct) || 0, change: parseFloat(p.change) || 0, high: parseFloat(p.high) || 0, low: parseFloat(p.low) || 0, open: parseFloat(p.open) || 0 } : null;
  }).filter(Boolean);
}

function parseEtfLines(raw) {
  return raw.split('\n').filter(Boolean).map(line => {
    const p = parseTencentLine(line, { name: 1, code: 2, price: 3, change: 31, changePct: 32 });
    return p ? { name: p.name, code: p.code, price: parseFloat(p.price) || 0, change: parseFloat(p.change) || 0, changePct: parseFloat(p.changePct) || 0 } : null;
  }).filter(Boolean);
}

function parseGoldEtfs(raw) {
  return raw.split('\n').filter(Boolean).map(line => {
    const p = parseTencentLine(line, { name: 1, code: 2, price: 3, change: 31, changePct: 32 });
    return p ? { name: p.name, code: p.code, price: parseFloat(p.price) || 0, change: parseFloat(p.change) || 0, changePct: parseFloat(p.changePct) || 0 } : null;
  }).filter(Boolean);
}

// ─── News cache helpers ─────────────────────────────────────────
function getCachedNews() {
  try {
    const raw = localStorage.getItem(NEWS_CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts < NEWS_CACHE_TTL) {
      return parsed.news;
    }
  } catch(e) { /* ignore */ }
  return null;
}

function setCachedNews(news) {
  try {
    localStorage.setItem(NEWS_CACHE_KEY, JSON.stringify({ news, ts: Date.now() }));
  } catch(e) { /* localStorage full, ignore */ }
}

// ─── Parse RSS XML items ───────────────────────────────────
function parseRSSItems(xmlStr) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlStr, 'text/xml');
  const items = xml.querySelectorAll('item');
  return Array.from(items).slice(0, 10).map(item => ({
    title: item.querySelector('title')?.textContent || '',
    link: item.querySelector('link')?.textContent || '',
    pubDate: item.querySelector('pubDate')?.textContent || '',
    content: (item.querySelector('description')?.textContent || '').replace(/<[^>]*>/g,'').substring(0, 300),
  }));
}

async function fetchNews() {
  // Try cache first
  const cached = getCachedNews();
  if (cached && cached.length > 0) {
    return { news: cached, cached: true };
  }

  const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  const rssUrl = 'https://feeds.content.dowjones.io/public/rss/mw_topstories';

  // Method 1: Same-origin news-cache.json (GitHub Actions or manual push)
  if (!isLocal) {
    try {
      const resp = await fetch('./news-cache.json', { cache: 'no-cache' });
      if (resp.ok) {
        const data = await resp.json();
        if (data.items && data.items.length > 0) {
          setCachedNews(data.items);
          return { news: data.items, cached: false };
        }
      }
    } catch(e) { console.warn('Cache JSON fetch failed:', e.message); }
  }

  // Method 2: Local API
  if (isLocal) {
    try {
      const resp = await fetch('/api/news', { cache: 'no-cache' });
      const data = await resp.json();
      if (data.items && data.items.length > 0) {
        setCachedNews(data.items);
        return { news: data.items, cached: false };
      }
    } catch(e) { console.warn('Local API failed:', e.message); }
  }

  // Method 3: allorigins.win CORS proxy
  try {
    const resp = await fetch(
      'https://api.allorigins.win/get?url=' + encodeURIComponent(rssUrl),
      { cache: 'no-cache' }
    );
    const data = await resp.json();
    if (data?.status?.http_code === 200 && data.contents) {
      const items = parseRSSItems(data.contents);
      if (items.length > 0) {
        setCachedNews(items);
        return { news: items, cached: false };
      }
    }
  } catch(e) { console.warn('Proxy failed:', e.message); }

  // Fallback: return cached even if expired
  try {
    const raw = localStorage.getItem(NEWS_CACHE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.news && parsed.news.length > 0) {
        return { news: parsed.news, cached: true, stale: true };
      }
    }
  } catch(e) { /* ignore */ }

  return { news: [], cached: false };
}

// ─── Fetch ─────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const start = Date.now();

    const results = await Promise.allSettled([
      fetchTencent('sh000001,sh000688,sh000016,sz399001,sz399006,sz399005')
        .then(parseTencentLines).then(d => ({ key: 'indices', val: d })),
      fetchTencent('sh688981,sh688012,sh688008,sh688126,sh603986,sh600703,sh600171,sh688019,sh688200,sh688018,sh688072,sh688041,sh688256,sh600460')
        .then(parseStockLines).then(d => ({ key: 'stocks', val: d })),
      fetchTencent('sz159995,sh512480,sh512760,sz159813,sz159997')
        .then(parseEtfLines).then(d => ({ key: 'etfs', val: d })),
      fetchTencent('sh518880,sh518800')
        .then(parseGoldEtfs).then(d => ({ key: 'goldSilver', val: { goldEtfs: d } })),
      fetchNews().then(d => ({ key: 'newsResult', val: d })),
    ]);

    const data = {};
    results.forEach(r => {
      if (r.status === 'fulfilled') { data[r.value.key] = r.value.val; }
    });
    data.indices = data.indices || [];
    data.stocks = data.stocks || [];
    data.etfs = data.etfs || [];
    data.goldSilver = data.goldSilver || {};

    // Normalize news result
    const nr = data.newsResult || { news: [], cached: false };
    data.news = nr.news || [];
    data.newsCached = nr.cached || false;
    data.newsStale = nr.stale || false;

    lastData = data;
    render(data);

    const elapsed = Date.now() - start;

    let badgeText = '';
    if (data.newsStale) {
      badgeText = '<span class="news-badge badge-cache">🕐 缓存(过期)</span>';
    } else if (data.newsCached && data.news.length > 0) {
      badgeText = '<span class="news-badge badge-cache">💾 缓存</span>';
    } else if (!data.newsCached && data.news.length > 0) {
      badgeText = '<span class="news-badge badge-fresh">🆕 最新</span>';
    }
    document.getElementById('newsBadge').innerHTML = badgeText;
    document.getElementById('newsBadge').style.display = badgeText ? 'inline' : 'none';

    document.getElementById('updateTime').textContent =
      '🕐 ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) +
      ' · 响应 ' + elapsed + 'ms';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    console.error(e);
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--red);">❌ 数据获取失败: ' + e.message + '</div>';
  }
}

function refreshNow() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⟳ 更新中...';
  fetchAll().finally(() => {
    btn.disabled = false;
    btn.textContent = '⟳ 刷新数据';
  });
}

// ─── Render ────────────────────────────────────────────────────
function render(data) {
  renderIndices(data.indices);
  renderETFs(data.etfs);
  renderStocks(data.stocks);
  renderGoldSilver(data.goldSilver);
  renderNews(data.news);
  renderNewsAnalysis(data);
  renderForeignPreview(data);
  renderTomorrowFocus(data);
  renderStrategy(data);
  renderRecommendations(data);
}

// ═══ 指数 ═══
function renderIndices(indices) {
  const grid = document.getElementById('indicesGrid');
  grid.innerHTML = (indices || []).map(idx => {
    const cls = idx.changePct >= 0 ? 'up' : 'down';
    const arrow = idx.changePct >= 0 ? '▲' : '▼';
    return `<div class="card">
      <div class="label">${idx.name}</div>
      <div class="value ${cls}">${idx.price.toFixed(2)}</div>
      <div class="sub ${cls}">${arrow} ${idx.change.toFixed(2)} (${idx.changePct.toFixed(2)}%)</div>
    </div>`;
  }).join('');

  // Analysis
  const sci = (indices || []).find(i => i.name === '科创50');
  const sh = (indices || []).find(i => i.name === '上证指数');
  const cy = (indices || []).find(i => i.name === '创业板指');
  const sz50 = (indices || []).find(i => i.name === '上证50');
  const an = document.getElementById('indexAnalysis');
  const semiUp = sci && sci.changePct > 0;

  let trendNote = '震荡整理';
  if (sh) {
    if (sh.changePct > 0.5) trendNote = '震荡上行';
    else if (sh.changePct < -0.5) trendNote = '承压回调';
  }
  let sciNote = '—';
  if (sci) {

        impactCls = 'neutral';
      } else {
        const hasBearish = bearishWords.some(w => combined.includes(w));
        const hasBullish = bullishWords.some(w => combined.includes(w));
        if (hasBearish && !hasBullish) { impact = '⚠️ 偏利空'; impactCls = 'bearish'; }

  }

// ═══ 操作思路 (数据驱动版) ═══
function renderStrategy(data) {
  const container = document.getElementById('strategyAnalysis');
  const stocks = data.stocks || [];
  const indices = data.indices || [];
  const news = data.news || [];

  const sh = indices.find(i => i.name === '上证指数');
  const sci = indices.find(i => i.name === '科创50');
  const cy = indices.find(i => i.name === '创业板指');
  const zd = stocks.find(s => s.code === '603986');
  const hf = stocks.find(s => s.code === '688200');
  const zw = stocks.find(s => s.code === '688012');
  const lq = stocks.find(s => s.code === '688008');

  const semiUpCount = stocks.filter(s => s.changePct > 2).length;
  const semiDownCount = stocks.filter(s => s.changePct < -2).length;
  const hasBroadcom = news.some(n => (n.title || '').includes('Broadcom'));
  const allEtfs = data.etfs || [];
  const etfAvgChg = allEtfs.length > 0 ? allEtfs.reduce((s,e) => s + (e.changePct||0), 0) / allEtfs.length : 0;

  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const dateStr = tomorrow.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

  // ── Strategy generation ──
  const points = [];

  // 1. Market direction assessment
  let marketSentiment = '中性震荡';
  if (sh) {
    if (sh.changePct > 0.3 && sci && sci.changePct > 0.5) marketSentiment = '偏多（科技领涨）';
    else if (sh.changePct < -0.3 && sci && sci.changePct < -0.3) marketSentiment = '偏弱（普跌格局）';
    else if (sh.changePct > 0 && sci && sci.changePct < 0) marketSentiment = '分化（主板强、科技弱）';
    else if (sh.changePct < 0 && sci && sci.changePct > 0) marketSentiment = '分化（科技强、主板弱）';
  }

  points.push({ icon: '📊', title: '市场研判', body: `大盘${marketSentiment}。${sci ? '科创50 ' + (sci.changePct >= 0 ? '强势' : '承压') + '，收盘' + Math.abs(sci.changePct).toFixed(2) + '%' : ''}。${cy ? '创业板指' + (cy.changePct >= 0 ? '同步' : '偏弱') + '。' : ''}` });

  // 2. Semiconductor strategy
  let semiStrategy = '';
  if (semiUpCount >= 3) {
    const rallyStocks = stocks.filter(s => s.changePct > 3).map(s => s.name).join('、');
    semiStrategy = `半导体板块今日全面爆发（${semiUpCount}只标的涨超2%），${rallyStocks}领涨。**中期趋势看好**，存储涨价周期+国产替代+AI需求三重逻辑。`;
    // Check if overextended
    const superHot = stocks.filter(s => s.changePct > 7).length;
    if (superHot > 0) {
      semiStrategy += ` ⚠️ 但短线涨幅较大（${superHot}只涨超7%），明日可能出现分歧。**已有仓位可继续持有，轻仓者等回踩5日线低吸，切忌追高。**`;
    } else {
      semiStrategy += ` 板块整体涨幅温和，趋势健康。**可逢低加仓，关注存储芯片和半导体设备方向。**`;
    }
  } else if (semiDownCount >= 3) {
    semiStrategy = `半导体板块今日承压（${semiDownCount}只跌超2%）。短线受情绪影响，但**中期逻辑不变（国产替代+存储涨价），回调反而是低吸机会。**关注前期支撑位。`;
  } else {
    semiStrategy = '半导体板块今日表现平稳，关注明日方向选择。**从中期角度看，存储芯片和半导体设备仍是核心主线，可逢低布局。**';
  }
  points.push({ icon: '🔬', title: '半导体策略', body: semiStrategy });

  // 3. Individual stock advice
  let stockAdvice = '';
  const advices = [];
  if (zd) {
    if (zd.changePct > 5) advices.push(`兆易创新(+${zd.changePct.toFixed(2)}%)强势${zd.price > 500 ? '突破500元' : '拉升'}，持有者设好止盈线(${zd.price}×0.95)，未入场等回调`);
    else if (zd.changePct > 2) advices.push(`兆易创新温和上涨${zd.changePct.toFixed(2)}%，趋势良好可继续持有`);
    else if (zd.changePct < -2) advices.push(`兆易创新回调${Math.abs(zd.changePct).toFixed(2)}%，关注${(zd.price * 0.95).toFixed(2)}支撑`);
    else advices.push(`兆易创新平盘震荡，等待方向选择`);
  }
  if (zw) {
    if (zw.changePct > 2) advices.push(`中微公司(+${zw.changePct.toFixed(2)}%)走强，刻蚀设备龙头业绩确定性强，可中线持有`);
    else if (zw.changePct < -2) advices.push(`中微公司回调${Math.abs(zw.changePct).toFixed(2)}%，国产替代逻辑不变，回调是机会`);
  }
  if (hf && hf.changePct > 2) {
    advices.push(`华峰测控(+${hf.changePct.toFixed(2)}%)存储测试机龙头，短线涨幅大，已有仓位可持有不追`);
  }
  if (lq && lq.changePct > 2) {
    advices.push(`澜起科技(+${lq.changePct.toFixed(2)}%)DDR5内存接口龙头，AI服务器需求直接受益，趋势良好`);
  }

  stockAdvice = advices.length > 0
    ? advices.join('；') + '。'
    : '关注池内个股波动有限，等待市场方向明确。';
  points.push({ icon: '🎯', title: '个股操作', body: stockAdvice });

  // 4. Gold strategy
  const gsRaw = data.goldSilver || {};
  const goldEtfs = gsRaw?.goldEtfs || [];
  const goldAvgChg = goldEtfs.length > 0 ? goldEtfs.reduce((s,e) => s+(e.changePct||0),0)/goldEtfs.length : 0;

  let goldAdvice = '';
  if (goldAvgChg < -0.5) {
    goldAdvice = '黄金ETF今日回调。中长期配置窗口，**可分批建仓**。全球央行购金趋势持续+美元信用弱化为长期支撑。短线关注国际金价支撑。';
  } else if (goldAvgChg > 0.5) {
    goldAdvice = '黄金ETF今日走强。持有者可继续持有，**不建议追涨**。短线关注是否突破前高。';
  } else {
    goldAdvice = '黄金ETF今日震荡。**中长期配置价值仍在**，可逢低关注。全球央行购金趋势提供底部支撑。';
  }
  points.push({ icon: '🥇', title: '黄金策略', body: goldAdvice });

  // 5. Overall strategy
  let overall = '';
  if (marketSentiment.includes('科技强') || marketSentiment.includes('科技领涨')) {
    overall = '**继续向半导体/存储方向倾斜仓位**，科技强、消费弱格局延续。控制总仓位在6-7成，留足弹药等回调加仓。';
    if (hasBroadcom) overall += ' 注意Broadcom消息对开盘情绪的影响，低开是机会。';
  } else if (marketSentiment.includes('偏弱')) {
    overall = '**控制仓位在4-5成**，等待市场企稳。半导体方向回调可分批低吸，不急于抄底。';
  } else {
    overall = '**维持中性仓位（5-6成）**，科技方向可适度偏向。市场方向未明确前不追高，耐心等机会。';
  }
  points.push({ icon: '💡', title: '整体策略', body: overall });

  const html = points.map(p =>
    `<div class="recommend" style="border-left-color:var(--accent);">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
        <span>${p.icon}</span>
        <strong style="color:var(--accent);font-size:0.85em;">${p.title}</strong>
      </div>
      <div class="r-reason">${p.body}</div>
    </div>`
  ).join('');

  container.innerHTML = `<div class="section-title" style="color:var(--accent);font-size:0.95em;">📅 ${dateStr} 操作思路</div>
  ${html}
  <div style="font-size:0.72em;color:var(--text-dim);margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
    以上分析基于实时行情数据自动生成，仅供参考，不构成投资建议。市场有风险，投资需谨慎。
  </div>`;
}

// ─── Helper ────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return str; }
}

// ─── Auto-refresh ──────────────────────────────────────────────
function startAutoRefresh() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(fetchAll, 5 * 60 * 1000);
}
